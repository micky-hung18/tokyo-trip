const hasApi = API_URL && !API_URL.includes('__APPS_SCRIPT');

async function syncLoad() {
  if (!hasApi) { loadShopLists(); return; }
  state.syncStatus = 'loading'; render();
  try {
    const r = await fetch(API_URL);
    const d = await r.json();
    if (d && typeof d === 'object') { 
      if(d.shopLists) { state.shopLists = d.shopLists; state.extraCosts = d.extraCosts || []; state.fixedCostEdits = d.fixedCostEdits || {}; } 
      else { state.shopLists = d; } 
      saveShopLists(); state.syncStatus = 'synced'; state.lastSync = new Date(); }
  } catch(e) { console.error(e); loadShopLists(); state.syncStatus = 'offline'; }
  render();
}

async function syncSave() {
  saveShopLists();
  if (!hasApi) return;
  state.syncStatus = 'saving'; render();
  try {
    await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({shopLists:state.shopLists,extraCosts:state.extraCosts,fixedCostEdits:state.fixedCostEdits}), mode: 'no-cors' });
    state.syncStatus = 'synced'; state.lastSync = new Date();
  } catch(e) { console.error(e); state.syncStatus = 'offline'; }
  render();
}

function debouncedSync() { clearTimeout(_saveTimer); _saveTimer = setTimeout(() => syncSave(), 800); }

          content.append(h("div",{className:"cost-item",style:{borderLeft:"3px solid "+payer.color,flexWrap:"wrap",cursor:"pointer"},onClick:()=>{state.editingCostId=c.id;render()}},
            h("div",{style:{flex:"1 1 60%",minWidth:0}},h("div",{style:{fontSize:"14px",fontWeight:600}},c.item),h("div",{style:{fontSize:"10px",color:"#999",marginTop:"2px"}},(c.note?c.note+" · ":"")+(c.date||""))),
            h("div",{style:{fontSize:"15px",fontWeight:700,marginRight:"8px",flexShrink:0}},"NT$ "+c.amount.toLocaleString()),
            h("button",{className:"del-btn",onClick:e=>{e.stopPropagation();deleteExtraCost(c.id)}},"×"),
            h("div",{style:{width:"100%",display:"flex",gap:"8px",marginTop:"4px",fontSize:"10px",color:"#888"}},
              h("span",{style:{background:payer.color+"15",padding:"1px 6px",borderRadius:"8px",color:payer.color,fontWeight:600}},payer.emoji+" 墊付"),
              h("span",{style:{background:"#f5f5f5",padding:"1px 6px",borderRadius:"8px"}},splitNames+" 分攤"),
              h("span",{style:{color:"#ccc"}},"點擊編輯")
            )
          ))}
        });
    }
    // Settlement calculation
    const balances=[0,0,0,0];
    // Fixed costs with custom paidBy and split
    costsData.forEach(c=>{const payer=c.paidBy||0;const splitters=c.split||[0,1,2,3];const share=Math.round(c.amount/splitters.length);balances[payer]+=c.amount;splitters.forEach(i=>balances[i]-=share)});
    // Extra costs
    state.extraCosts.forEach(c=>{
      const payer=c.paidBy||0;const splitters=c.split||[0,1,2,3];
      const share=Math.round(c.amount/splitters.length);
      balances[payer]+=c.amount;
      splitters.forEach(i=>balances[i]-=share);
    });
    content.append(h("div",{style:{marginTop:"20px",background:"#fff",borderRadius:"14px",padding:"16px 20px",border:"1px solid #e8e8e8",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}},
      h("div",{style:{fontWeight:700,fontSize:"14px",marginBottom:"12px"}},"結算（誰該拿回 / 該付）"),
      h("div",{style:{display:"flex",flexDirection:"column",gap:"6px"}},...MEMBERS.map((m,i)=>{
        const bal=balances[i];
        const isPositive=bal>0;
        return h("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"10px 14px",borderRadius:"12px",background:m.color+"08"}},
          h("span",{style:{fontSize:"22px"}},m.emoji),
          h("div",{style:{flex:1}},h("div",{style:{fontSize:"12px",fontWeight:600,color:m.color}},m.name)),
          h("div",{style:{fontSize:"14px",fontWeight:800,color:isPositive?"#8BC89B":"#E8927C"}},
            (isPositive?"+":"")+"NT$ "+Math.abs(bal).toLocaleString()),
          h("div",{style:{fontSize:"10px",color:"#999",width:"48px",textAlign:"right"}},isPositive?"該拿回":"該付出")
        )}))
    ));
  }

  app.append(content);
  if(selectedSpot){const modal=renderSpotModal(selectedSpot);if(modal)app.append(modal)}
}

// Shopping helpers
function addShopItem(){
  const text=state.shopInput.trim();
  if(!text)return;
  const nl={...state.shopLists};
  nl[state.activeMember]=[...nl[state.activeMember],{text,checked:false,id:Date.now()}];
  state.shopInput="";
  setState({shopLists:nl});
  debouncedSync();
}
function toggleShopItem(id){
  const nl={...state.shopLists};
  nl[state.activeMember]=nl[state.activeMember].map(i=>i.id===id?{...i,checked:!i.checked}:i);
  setState({shopLists:nl});
  debouncedSync();
}
function deleteShopItem(id){
  const nl={...state.shopLists};
  nl[state.activeMember]=nl[state.activeMember].filter(i=>i.id!==id);
  setState({shopLists:nl});
  debouncedSync();
}
function clearCheckedItems(){
  const nl={...state.shopLists};
  nl[state.activeMember]=nl[state.activeMember].filter(i=>!i.checked);
  setState({shopLists:nl});
  debouncedSync();
}

function addExtraCost(){
  const item=state.costItemInput.trim();
  const raw=parseInt(state.costAmountInput);
  if(!item||!raw||isNaN(raw))return;
  const isJpy=state.costCurrency==="JPY";
  const rate=0.20;
  const amount=isJpy?Math.round(raw*rate):raw;
  const today=new Date();
  const dateStr=(today.getMonth()+1)+"/"+today.getDate();
  const note=isJpy?"¥"+raw.toLocaleString():"";
  state.extraCosts=[...state.extraCosts,{item,amount,date:dateStr,id:Date.now(),note,paidBy:state.costPaidBy,split:state.costSplitAmong.slice()}];
  state.costItemInput="";state.costAmountInput="";
  setState({});debouncedSync();
}
function deleteExtraCost(id){
  state.extraCosts=state.extraCosts.filter(c=>c.id!==id);
  setState({});debouncedSync();
}

render();
</script>
</body>
</html>
